<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    // Apply saved theme before render to avoid flash
    (function () {
      const saved = localStorage.getItem('tetris-theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <div class="theme-toggle">
            <span class="toggle-label">DARK</span>
            <label class="toggle-switch" aria-label="Cambiar tema">
              <input type="checkbox" id="theme-toggle" />
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">LIGHT</span>
          </div>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    (function () {
      const toggle = document.getElementById('theme-toggle');
      const root = document.documentElement;

      // Sync checkbox state with current theme
      toggle.checked = root.getAttribute('data-theme') === 'light';

      toggle.addEventListener('change', function () {
        if (this.checked) {
          root.setAttribute('data-theme', 'light');
          localStorage.setItem('tetris-theme', 'light');
        } else {
          root.removeAttribute('data-theme');
          localStorage.setItem('tetris-theme', 'dark');
        }
      });
    })();
  </script>
</body>
</html>
